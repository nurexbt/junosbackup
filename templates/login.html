<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Juniper Config Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: #0f172a; }
    .login-card {
      background: rgba(255,255,255,.98);
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
    }
    .form-input {
      width: 100%; padding: 10px 14px; border-radius: 9px;
      border: 1.5px solid #e2e8f0; font-size: .9rem; color: #1e293b;
      background: #fff; transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .form-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .btn-login {
      width: 100%; padding: 11px; border-radius: 9px; font-size: .95rem;
      font-weight: 600; cursor: pointer; border: none;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: linear-gradient(135deg, #1e40af, #2563eb); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }

    /* animated background blobs */
    .blob {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: .25; pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #1d4ed8; top: -100px; left: -100px; animation: float1 12s ease-in-out infinite; }
    .blob-2 { width: 400px; height: 400px; background: #38bdf8; bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
    .blob-3 { width: 300px; height: 300px; background: #7c3aed; bottom: 40%; left: 40%; animation: float3 14s ease-in-out infinite; }
    @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px,30px) scale(1.06); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px,-40px) scale(1.08); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,-20px) scale(1.04); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="login-card w-full max-w-sm p-8 relative z-10">
    <!-- Logo / Brand -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mb-4 shadow-lg"
           style="background:linear-gradient(135deg,#1d4ed8,#38bdf8);">
        <i class="bi bi-router text-white text-2xl"></i>
      </div>
      <h1 class="text-xl font-bold text-slate-800">Juniper Config Manager</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to your account</p>
    </div>

    {% if error %}
    <div style="background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:9px;padding:10px 14px;font-size:.85rem;display:flex;align-items:center;gap:8px;margin-bottom:18px;">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div style="background:{% if cat=='success' %}#f0fdf4{% elif cat=='warning' %}#fffbeb{% else %}#eff6ff{% endif %};
                  color:{% if cat=='success' %}#166534{% elif cat=='warning' %}#92400e{% else %}#1e40af{% endif %};
                  border:1px solid {% if cat=='success' %}#bbf7d0{% elif cat=='warning' %}#fde68a{% else %}#bfdbfe{% endif %};
                  border-radius:9px;padding:10px 14px;font-size:.85rem;
                  display:flex;align-items:center;gap:8px;margin-bottom:18px;">
        <i class="bi bi-info-circle"></i><span>{{ msg }}</span>
      </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-4">
        <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
          <i class="bi bi-person mr-1"></i>Username
        </label>
        <input type="text" name="username" class="form-input" placeholder="Enter username"
               autocomplete="username" autofocus required />
      </div>
      <div class="mb-6">
        <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
          <i class="bi bi-lock mr-1"></i>Password
        </label>
        <div style="position:relative;">
          <input type="password" name="password" id="passwordInput" class="form-input"
                 placeholder="Enter password" autocomplete="current-password" required
                 style="padding-right:42px;" />
          <button type="button" id="togglePwd"
                  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:1rem;padding:0;"
                  onclick="togglePassword()">
            <i class="bi bi-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i>
        Sign In
      </button>
    </form>

    <div class="mt-6 pt-5" style="border-top:1px solid #f1f5f9;text-align:center;">
      <p class="text-xs text-slate-400">Juniper Config Manager &nbsp;·&nbsp; v1.0</p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const inp  = document.getElementById('passwordInput');
      const icon = document.getElementById('toggleIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
</body>
</html>
